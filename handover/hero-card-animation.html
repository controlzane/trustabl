<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trustabl — Hero Card Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050506;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      color: #fff;
    }

    /* ── Card ── */
    .hero-card {
      position: relative;
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(18,18,20,0.90);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.40);
    }

    /* ── Header ── */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.03);
      padding: 16px 20px;
    }

    .window-dots { display: flex; align-items: center; gap: 8px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot-red    { background: #ff5f57; }
    .dot-yellow { background: #febc2e; }
    .dot-green  { background: #28c840; }

    .filename {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #9ca3af;
    }

    .phase-badge {
      border-radius: 6px;
      border: 1px solid;
      padding: 4px 12px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    /* ── Body ── */
    .card-body {
      display: flex;
      flex-direction: column;
      padding: 16px 20px;
      gap: 12px;
    }

    /* ── CLI Box ── */
    .cli-box {
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.30);
      padding: 16px;
    }

    .cli-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.24em;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .cli-status { transition: color 0.3s ease; }

    .cli-lines { overflow: hidden; }
    .cli-lines.has-error { height: 128px; }
    .cli-lines.no-error  { height: 168px; }

    /* ── Line item ── */
    .line-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 2px 0;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.75;
      color: #e5e7eb;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .line-item.visible { opacity: 1; transform: translateY(0); }

    .line-num {
      width: 16px;
      flex-shrink: 0;
      text-align: left;
      color: #4b5563;
      user-select: none;
    }

    .line-text { word-break: break-all; }

    /* Line type modifiers */
    .line-item.line-risk { background: rgba(239,68,68,0.10); }
    .line-item.line-risk .line-text {
      color: #f87171;
      text-decoration: underline wavy rgba(239,68,68,0.60);
      text-underline-offset: 2px;
    }
    .line-item.line-removed { background: rgba(239,68,68,0.10); }
    .line-item.line-removed .line-text { color: #f87171; }
    .line-item.line-added   { background: rgba(45,212,191,0.07); }
    .line-item.line-added .line-text   { color: #2DD4BF; }

    /* Accent helpers on .line-text */
    .accent-teal  { color: #2DD4BF; }
    .accent-red   { color: #f87171; }
    .accent-amber { color: #fbbf24; }

    /* ── Error log ── */
    .error-log {
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid rgba(239,68,68,0.20);
      background: rgba(239,68,68,0.07);
      padding: 8px 12px;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.7s ease, transform 0.7s ease;
      display: none;
    }
    .error-log.active  { display: block; }
    .error-log.visible { opacity: 1; transform: translateY(0); }
    .error-log span {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: #f87171;
    }

    /* ── Pills ── */
    .pills-label {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.28em;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .pills-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .pill {
      width: 100%;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.03);
      padding: 4px 12px;
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      color: #d1d5db;
    }

    /* Status counter colors */
    .status-yellow { color: #facc15; }
    .status-orange { color: #fb923c; }
  </style>
</head>
<body>

<div class="hero-card">
  <div class="card-header">
    <div class="window-dots">
      <span class="dot dot-red"></span>
      <span class="dot dot-yellow"></span>
      <span class="dot dot-green"></span>
    </div>
    <span class="filename">skill.ts</span>
    <span class="phase-badge" id="phaseBadge"></span>
  </div>

  <div class="card-body">
    <div class="cli-box">
      <div class="cli-meta">
        <span>CLI Session</span>
        <span class="cli-status" id="cliStatus"></span>
      </div>
      <div class="cli-lines no-error" id="cliLines"></div>
      <div class="error-log" id="errorLog"><span id="errorLogText"></span></div>
    </div>

    <div>
      <p class="pills-label">Automatically Enriches These Failure Modes</p>
      <div class="pills-grid">
        <span class="pill">Validation Rules</span>
        <span class="pill">Retry Safety</span>
        <span class="pill">Observability</span>
        <span class="pill">Guardrails</span>
      </div>
    </div>
  </div>
</div>

<script>
  const LINE_DELAY_MS  = 320;
  const PHASE_PAUSE_MS = 1900;

  const PHASES = [
    {
      label: 'SCANNING',
      badge: 'Detecting',
      badgeStyle: 'border-color:rgba(255,255,255,0.10);background:rgba(255,255,255,0.05);color:#d1d5db',
      accent: 'accent-teal',
      lines: [
        '// scanning skill.ts for issues...',
        'checkInputValidation()',
        'checkRetryPolicy()',
        'checkObservability()',
        'checkGuardrails()',
      ],
      issueCounter: true,
    },
    {
      label: 'ANALYSIS',
      badge: '3 Critical Found',
      badgeStyle: 'border-color:rgba(239,68,68,0.30);background:rgba(239,68,68,0.10);color:#f87171',
      accent: 'accent-red',
      lines: [
        '// 3 critical issues detected',
        '✗  no input validation',
        '✗  missing retry logic',
        '✗  zero observability',
        '⚠  no guardrails',
      ],
      riskLines: [1, 2, 3, 4],
      errorLog: 'Agent looped 47×  ·  no backoff  ·  $2.40 wasted',
    },
    {
      label: 'ENRICHMENT',
      badge: 'Plan Ready',
      badgeStyle: 'border-color:rgba(245,158,11,0.30);background:rgba(245,158,11,0.10);color:#fbbf24',
      accent: 'accent-amber',
      lines: [
        '// generating enrichment plan...',
        '[1] add validate(params, schema)',
        '[2] wrap with retry({ attempts: 3 })',
        '[3] inject observability hooks',
        '[4] apply guardrail constraints',
      ],
    },
    {
      label: 'AUTOFIX',
      badge: 'Applying',
      badgeStyle: 'border-color:rgba(45,212,191,0.25);background:rgba(45,212,191,0.10);color:#2DD4BF',
      accent: 'accent-teal',
      lines: [
        '// applying fixes...',
        '- return tool.run(params)',
        '+ validate(params, schema)',
        '+ return await retry(tool.run, {',
        '+   attempts: 3, backoff: true',
        '+ })',
      ],
      diffLines: { removed: [1], added: [2, 3, 4, 5] },
    },
    {
      label: 'ENRICHED',
      badge: 'Production Ready',
      badgeStyle: 'border-color:rgba(45,212,191,0.25);background:rgba(45,212,191,0.10);color:#2DD4BF',
      accent: 'accent-teal',
      lines: [
        '// score: 91% — production ready ✓',
        'async function callTool(params) {',
        '  validate(params, schema)',
        '  return await retry(tool.run, {',
        '    attempts: 3, backoff: true',
        '  })',
        '}',
      ],
    },
  ];

  let phaseIndex   = 0;
  let pendingTimers = [];

  function killTimers() {
    pendingTimers.forEach(clearTimeout);
    pendingTimers = [];
  }

  function after(ms, fn) {
    const id = setTimeout(fn, ms);
    pendingTimers.push(id);
  }

  function issueLabel(visibleCount) {
    if (visibleCount < 2) return { text: 'Scanning...',         cls: 'accent-teal' };
    if (visibleCount === 2) return { text: '1 issue found',     cls: 'status-yellow' };
    if (visibleCount === 3) return { text: '2 issues found',    cls: 'status-yellow' };
    return                         { text: '3 critical · 1 warning', cls: 'status-orange' };
  }

  function showPhase(idx) {
    killTimers();

    const phase     = PHASES[idx];
    const badge     = document.getElementById('phaseBadge');
    const cliLines  = document.getElementById('cliLines');
    const cliStatus = document.getElementById('cliStatus');
    const errorLog  = document.getElementById('errorLog');
    const errorText = document.getElementById('errorLogText');

    // Header badge
    badge.textContent = phase.label;
    badge.setAttribute('style', phase.badgeStyle);

    // Status label
    if (phase.issueCounter) {
      const { text, cls } = issueLabel(0);
      cliStatus.textContent = text;
      cliStatus.className = 'cli-status ' + cls;
    } else {
      cliStatus.textContent = phase.badge;
      cliStatus.className = 'cli-status ' + phase.accent;
    }

    // Error log reset
    errorLog.className = 'error-log';
    if (phase.errorLog) {
      errorText.textContent = '✗ ' + phase.errorLog;
      errorLog.classList.add('active');
      cliLines.className = 'cli-lines has-error';
    } else {
      cliLines.className = 'cli-lines no-error';
    }

    // Build line DOM (all hidden)
    cliLines.innerHTML = '';
    phase.lines.forEach((text, i) => {
      const item = document.createElement('div');
      item.className = 'line-item';

      if (phase.riskLines && phase.riskLines.includes(i)) {
        item.classList.add('line-risk');
      } else if (phase.diffLines && phase.diffLines.removed.includes(i)) {
        item.classList.add('line-removed');
      } else if (phase.diffLines && phase.diffLines.added.includes(i)) {
        item.classList.add('line-added');
      }

      const num = document.createElement('span');
      num.className = 'line-num';
      num.textContent = i;

      const txt = document.createElement('span');
      txt.className = 'line-text';
      if (i === 0 && !item.classList.contains('line-risk') &&
                     !item.classList.contains('line-removed') &&
                     !item.classList.contains('line-added')) {
        txt.classList.add(phase.accent);
      }
      txt.textContent = text;

      item.appendChild(num);
      item.appendChild(txt);
      cliLines.appendChild(item);
    });

    const lineEls = cliLines.querySelectorAll('.line-item');

    // Stagger reveals
    lineEls.forEach((el, i) => {
      after(140 + i * LINE_DELAY_MS, () => {
        el.classList.add('visible');

        if (phase.issueCounter) {
          const { text, cls } = issueLabel(i + 1);
          cliStatus.textContent = text;
          cliStatus.className = 'cli-status ' + cls;
        }

        if (phase.errorLog && i === phase.lines.length - 1) {
          after(300, () => errorLog.classList.add('visible'));
        }
      });
    });

    // Next phase
    const cycleDuration = 140 + phase.lines.length * LINE_DELAY_MS + PHASE_PAUSE_MS;
    after(cycleDuration, () => {
      phaseIndex = (phaseIndex + 1) % PHASES.length;
      showPhase(phaseIndex);
    });
  }

  showPhase(0);
</script>
</body>
</html>

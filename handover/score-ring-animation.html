<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trustabl — Score Ring Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050506;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      color: #fff;
    }

    .card {
      width: 340px;
      height: 144px;
      background: #0A0A0C;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      overflow: hidden;
    }

    .ring-wrap {
      position: relative;
      width: 68px;
      height: 68px;
    }

    .ring-wrap svg {
      display: block;
    }

    .ring-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #score-text {
      font-size: 15px;
      font-weight: 900;
      line-height: 1;
      transition: color 0.5s ease;
    }

    #prod-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #6B7280;
    }

    #ring-fill {
      transition: stroke-dashoffset 0.08s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.5s ease;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="ring-wrap">
      <svg width="68" height="68" viewBox="0 0 68 68">
        <!-- track -->
        <circle cx="34" cy="34" r="28" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="4" />
        <!-- fill -->
        <circle id="ring-fill"
          cx="34" cy="34" r="28"
          fill="none"
          stroke="#EF4444"
          stroke-width="4"
          stroke-linecap="round"
          transform="rotate(-90 34 34)"
        />
      </svg>
      <div class="ring-label">
        <span id="score-text">38%</span>
      </div>
    </div>
    <span id="prod-label">Production Score</span>
  </div>

  <script>
    const R = 28;
    const CIRC = 2 * Math.PI * R;
    const LOOP_MS = 7000;

    const ringFill   = document.getElementById('ring-fill');
    const scoreText  = document.getElementById('score-text');

    function colorFor(s) {
      if (s >= 80) return '#2DD4BF';
      if (s >= 60) return '#F59E0B';
      return '#EF4444';
    }

    function setScore(s) {
      const offset = CIRC * (1 - s / 100);
      const color  = colorFor(s);
      ringFill.setAttribute('stroke-dasharray', CIRC);
      ringFill.setAttribute('stroke-dashoffset', offset);
      ringFill.setAttribute('stroke', color);
      scoreText.textContent = s + '%';
      scoreText.style.color = color;
    }

    let intervalId   = null;
    let delayId      = null;
    let loopId       = null;

    function play() {
      // reset to 38 instantly (no transition)
      ringFill.style.transition = 'none';
      scoreText.style.transition = 'none';
      setScore(38);

      // re-enable transitions after paint
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          ringFill.style.transition   = 'stroke-dashoffset 0.08s cubic-bezier(0.4,0,0.2,1), stroke 0.5s ease';
          scoreText.style.transition  = 'color 0.5s ease';
        });
      });

      // start counting up after 700ms
      delayId = setTimeout(() => {
        let s = 38;
        intervalId = setInterval(() => {
          s = Math.min(s + 1, 90);
          setScore(s);
          if (s >= 90) {
            clearInterval(intervalId);
            intervalId = null;
          }
        }, 40);
      }, 700);
    }

    play();
    loopId = setInterval(play, LOOP_MS);
  </script>
</body>
</html>

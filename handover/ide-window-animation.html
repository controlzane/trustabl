<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trustabl — IDE Review Window</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #050506;
    font-family: 'Poppins', sans-serif;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* ── Outer window ── */
  .ide-window {
    margin: 0 auto;
    width: 100%;
    max-width: 1280px;
    overflow: hidden;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(10,12,20,0.70);
    box-shadow: 0 40px 100px rgba(0,0,0,0.65);
    backdrop-filter: blur(40px);
  }

  /* ── Title bar ── */
  .title-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.04);
    padding: 10px 16px;
  }
  .title-dots { display: flex; gap: 6px; }
  .title-dots span { width: 11px; height: 11px; border-radius: 50%; display: block; }
  .dot-red    { background: #ff5f57; }
  .dot-yellow { background: #febc2e; }
  .dot-green  { background: #28c840; }
  .title-center {
    display: none;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    color: #6b7280;
  }
  .title-center .repo { color: #9ca3af; }
  .title-center .sep { color: rgba(255,255,255,0.15); }
  .title-spacer { width: 44px; }

  /* ── Scan status strip ── */
  .scan-strip {
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    background: rgba(45,212,191,0.03);
    padding: 6px 16px;
    font-size: 11px;
    color: #6b7280;
  }
  .scan-strip .play { color: #2DD4BF; }
  .scan-strip .ci-line { display: none; color: #9ca3af; }
  .scan-strip .counters {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 10.5px;
  }
  .counters .grp { display: flex; align-items: center; gap: 4px; }
  .counters .grp.red   { color: #f87171; }
  .counters .grp.amber { color: #fbbf24; }
  .counters .grp.pass  { color: #5EEAD4; }
  .counters .grp .b { width: 6px; height: 6px; border-radius: 50%; display: block; }
  .counters .grp.red .b   { background: #ef4444; }
  .counters .grp.amber .b { background: #f59e0b; }
  .counters .grp.pass .b  { background: #2DD4BF; }
  .counters .grp.complete { display: none; align-items: center; gap: 6px; color: #5EEAD4; }
  .counters .grp.complete .b { background: #2DD4BF; box-shadow: 0 0 4px #00E5CC; }

  /* ── Three columns ── */
  .columns {
    display: grid;
    grid-template-columns: 1fr;
    min-height: 620px;
  }

  /* ── Findings sidebar ── */
  .findings-col {
    display: none;
    border-color: rgba(255,255,255,0.05);
    background: rgba(255,255,255,0.02);
  }
  .findings-col-header {
    border-bottom: 1px solid rgba(255,255,255,0.05);
    padding: 10px 14px;
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #6b7280;
  }
  .findings-list { padding: 8px; }
  .pillar-group { margin-bottom: 10px; }
  .pillar-label {
    padding: 4px 10px 4px 10px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #6b7280;
  }
  .finding-item {
    margin-bottom: 2px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    border-radius: 6px;
    border: 1px solid transparent;
    padding: 8px 10px;
    cursor: pointer;
    transition: background-color 0.15s, border-color 0.15s;
  }
  .finding-item:hover { background: rgba(255,255,255,0.05); }
  .finding-item.active {
    border-color: rgba(45,212,191,0.25);
    background: rgba(45,212,191,0.07);
  }
  .sev-icon {
    margin-top: 2px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    font-weight: 700;
  }
  .sev-red   { background: rgba(239,68,68,0.10); color: #f87171; }
  .sev-amber { background: rgba(245,158,11,0.10); color: #fbbf24; }
  .sev-pass  { background: rgba(45,212,191,0.10); color: #5EEAD4; }
  .finding-body { min-width: 0; flex: 1; }
  .finding-title {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 12.5px;
    font-weight: 500;
    color: #fff;
  }
  .finding-loc {
    margin-top: 2px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #6b7280;
  }

  /* ── Diff column ── */
  .diff-col {
    display: flex;
    min-height: 0;
    flex-direction: column;
    border-color: rgba(255,255,255,0.05);
    background: rgba(0,0,0,0.20);
  }
  .diff-tabbar {
    display: flex;
    height: 36px;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    background: rgba(255,255,255,0.03);
  }
  .diff-tab {
    display: flex;
    height: 100%;
    align-items: center;
    gap: 6px;
    border-bottom: 2px solid #2DD4BF;
    background: rgba(45,212,191,0.05);
    padding: 0 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #fff;
  }
  .diff-tab .sq {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    border: 1px solid #2DD4BF;
    display: block;
  }
  .diff-status {
    padding: 0 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #6b7280;
  }
  .diff-body {
    min-height: 0;
    flex: 1;
    overflow-y: auto;
    background: rgba(0,0,0,0.30);
    padding: 8px 0;
  }
  .diff-code {
    padding: 8px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.9;
  }
  .diff-code .ctx { color: rgba(240,242,248,0.28); white-space: pre-wrap; padding: 0 12px; }
  .diff-code .removed { background: rgba(239,68,68,0.07); color: #FCA5A5; opacity: 0.65; text-decoration: line-through; white-space: pre-wrap; padding: 0 12px; }
  .diff-code .added { background: rgba(0,229,204,0.06); color: #5EEAD4; white-space: pre-wrap; padding: 0 12px; }
  .diff-code .kw { color: #C792EA; }
  .diff-code .fn { color: #82AAFF; }
  .diff-code .str { color: #C3E88D; }
  .diff-code .cm { color: rgba(240,242,248,0.28); font-style: italic; }

  /* ── Chat column ── */
  .chat-col {
    display: flex;
    min-height: 0;
    flex-direction: column;
    background: rgba(255,255,255,0.015);
  }
  .chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    background: rgba(255,255,255,0.02);
    padding: 12px 16px;
  }
  .chat-header .title { font-size: 14px; font-weight: 600; color: #fff; }
  .chat-header .count { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: #6b7280; }
  .chat-thread {
    min-height: 0;
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    scrollbar-width: none;
  }
  .chat-thread::-webkit-scrollbar { display: none; }
  .chat-entry {
    padding: 12px;
    cursor: pointer;
    scroll-margin-top: 12px;
  }
  .chat-entry .stack { display: flex; flex-direction: column; gap: 16px; }
  .chat-msg {
    font-size: 13px;
    line-height: 1.78;
    color: #d1d5db;
  }
  .chat-msg code {
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.08);
    padding: 1px 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    color: #fff;
  }
  .user-msg-row { display: flex; justify-content: flex-end; }
  .user-msg {
    display: inline-block;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.05);
    padding: 6px 12px;
    font-size: 13px;
    line-height: 1.6;
    color: #e5e7eb;
  }
  .fix-applied {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    color: #5EEAD4;
  }
  .chat-footer {
    border-top: 1px solid rgba(255,255,255,0.05);
    background: rgba(255,255,255,0.02);
    padding: 10px;
  }
  .chat-input {
    display: flex;
    align-items: center;
    gap: 8px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.05);
    padding: 8px 12px;
  }
  .chat-input .ph { flex: 1; font-size: 12px; color: #6b7280; }
  .chat-input .enter {
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.05);
    padding: 2px 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #6b7280;
  }

  /* ── Responsive: lg breakpoint (1024px) ── */
  @media (min-width: 1024px) {
    .columns {
      height: 620px;
      grid-template-columns: 27% 43% 30%;
    }
    .findings-col { display: block; border-right: 1px solid rgba(255,255,255,0.05); }
    .diff-col { border-right: 1px solid rgba(255,255,255,0.05); }
    .title-center { display: flex; }
    .scan-strip .ci-line { display: inline; }
    .counters .grp.complete { display: flex; }
  }
  @media (min-width: 768px) {
    .counters .grp.complete { display: flex; }
  }
</style>
</head>
<body>

<div class="ide-window">
  <!-- Title bar -->
  <div class="title-bar">
    <div class="title-dots">
      <span class="dot-red"></span>
      <span class="dot-yellow"></span>
      <span class="dot-green"></span>
    </div>
    <div class="title-center mono">
      <span class="repo">payment-agent-v2</span>
      <span class="sep">—</span>
      <span>trustabl scan</span>
    </div>
    <div class="title-spacer"></div>
  </div>

  <!-- Scan status strip -->
  <div class="scan-strip mono">
    <span class="play">▶</span>
    <span class="ci-line">github-actions / trustabl-action@v1 · on: push → main</span>
    <span class="counters">
      <span class="grp red"><span class="b"></span>3 high</span>
      <span class="grp amber"><span class="b"></span>4 med</span>
      <span class="grp pass"><span class="b"></span>1 pass</span>
      <span class="grp complete"><span class="b"></span>scan complete · 2.1s</span>
    </span>
  </div>

  <!-- Three columns -->
  <div class="columns">
    <!-- Findings -->
    <div class="findings-col">
      <div class="findings-col-header">Findings · <span id="findingsCount"></span></div>
      <div class="findings-list" id="findingsList"></div>
    </div>

    <!-- Diff -->
    <div class="diff-col">
      <div class="diff-tabbar">
        <div class="diff-tab mono">
          <span class="sq"></span>
          <span id="diffFile"></span>
        </div>
        <span class="diff-status mono" id="diffStatus"></span>
      </div>
      <div class="diff-body">
        <div class="diff-code" id="diffCode"></div>
      </div>
    </div>

    <!-- Chat -->
    <div class="chat-col">
      <div class="chat-header">
        <div class="title">Review session</div>
        <span class="count mono" id="chatCount"></span>
      </div>
      <div class="chat-thread" id="chatThread"></div>
      <div class="chat-footer">
        <div class="chat-input">
          <span class="ph">Reply to Trustabl...</span>
          <span class="enter">⏎</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  var PILLARS = [
    { label: 'Input validation', items: [0, 1] },
    { label: 'Retry logic', items: [2, 3] },
    { label: 'Observability', items: [4, 5] },
    { label: 'Guardrails', items: [6, 7] },
  ];

  var FINDINGS = [
    {
      title: 'Unsanitized input → shell',
      sevClass: 'sev-red',
      loc: 'tool_executor.py:42',
      sevIcon: '!',
      msg1: 'Your agent passes <code>user_input</code> straight into <code>run_command()</code>. A malicious prompt can make the agent execute arbitrary shell commands at runtime. The fix adds <code>sanitize()</code> with an explicit <code>SAFE_CMDS</code> allowlist.',
      userPrompt: 'Will the allowlist break my existing tool calls?',
      msg2: 'No — I traced every call site. All 6 callers only invoke <code>ls</code>, <code>cat</code>, or <code>git status</code>, which are in <code>SAFE_CMDS</code>. <strong style="color:#fff">No behavior change for current usage</strong> — safe to accept.',
      isPass: false, file: 'tool_executor.py',
      diff: '<div class="ctx">38   <span class="kw">import</span> shlex, subprocess</div>\
<div class="ctx">39   <span class="kw">from</span> trustabl.guards <span class="kw">import</span> sanitize</div>\
<div class="ctx">40</div>\
<div class="ctx">41   <span class="kw">def</span> <span class="fn">run_command</span>(user_input: <span class="kw">str</span>):</div>\
<div class="removed">42 -     cmd = user_input</div>\
<div class="added">42 +     cmd = <span class="fn">sanitize</span>(user_input, allow=SAFE_CMDS)</div>\
<div class="ctx">43       args = shlex.<span class="fn">split</span>(cmd)</div>\
<div class="ctx">44       <span class="kw">return</span> subprocess.<span class="fn">run</span>(args, capture_output=<span class="kw">True</span>)</div>\
<div class="ctx">45</div>\
<div class="ctx">46   SAFE_CMDS = [<span class="str">"ls"</span>, <span class="str">"cat"</span>, <span class="str">"git status"</span>]</div>',
    },
    {
      title: 'No schema on tool params',
      sevClass: 'sev-red',
      loc: 'agent_core.py:66',
      sevIcon: '!',
      msg1: '<code>call_tool()</code> accepts any params dict without checking required fields or types. Malformed inputs cause silent failures that are hard to debug in production. The fix validates against the tool\'s schema before execution.',
      userPrompt: 'What happens when validation fails at runtime?',
      msg2: '<code>validate()</code> raises <code>ToolParamError</code> with the missing field name, so the agent gets a structured error it can recover from instead of a silent <code>None</code>. <strong style="color:#fff">Safe to accept.</strong>',
      isPass: false, file: 'agent_core.py',
      diff: '<div class="ctx">63   <span class="kw">async def</span> <span class="fn">call_tool</span>(name: <span class="kw">str</span>, params: <span class="kw">dict</span>):</div>\
<div class="ctx">64       tool = REGISTRY[name]</div>\
<div class="removed">65 -     return <span class="kw">await</span> tool.<span class="fn">run</span>(params)</div>\
<div class="added">65 +     <span class="fn">validate</span>(params, tool.schema)  <span class="cm"># raises ToolParamError</span></div>\
<div class="added">66 +     <span class="kw">return</span> <span class="kw">await</span> tool.<span class="fn">run</span>(params)</div>\
<div class="ctx">67</div>\
<div class="ctx">68   REGISTRY = <span class="fn">load_tools</span>(<span class="str">"tools.yaml"</span>)</div>',
    },
    {
      title: 'No retry on timeout',
      sevClass: 'sev-red',
      loc: 'skills/web_search.py:76',
      sevIcon: '!',
      msg1: '<code>web_search()</code> makes a single attempt with no retry. On a network blip the agent gives up, then loops trying to recover — burning tokens. Observed in your traces: <strong style="color:#fff">47× loops, $2.40 wasted per run</strong>.',
      userPrompt: 'Why 3 attempts instead of more?',
      msg2: '3 attempts with exponential backoff covers 99.7% of transient failures in your trace history. More attempts past that mostly delays surfacing real outages. You can tune it in <code>RETRY_CONFIG</code>. <strong style="color:#fff">Safe to accept.</strong>',
      isPass: false, file: 'skills/web_search.py',
      diff: '<div class="ctx">73   <span class="kw">async def</span> <span class="fn">web_search</span>(query: <span class="kw">str</span>):</div>\
<div class="ctx">74       client = <span class="fn">SearchClient</span>(api_key=settings.SEARCH_KEY)</div>\
<div class="removed">75 -     return <span class="kw">await</span> client.<span class="fn">search</span>(query, top_k=5)</div>\
<div class="added">75 +     <span class="kw">return</span> <span class="kw">await</span> <span class="fn">retry</span>(</div>\
<div class="added">76 +         client.search, query, top_k=5,</div>\
<div class="added">77 +         attempts=3, backoff=<span class="kw">True</span>,</div>\
<div class="added">78 +     )</div>',
    },
    {
      title: 'No backoff strategy',
      sevClass: 'sev-amber',
      loc: 'skills/web_search.py:90',
      sevIcon: '~',
      msg1: 'Retries fire immediately with no delay. Under load this hammers the downstream API, raises error rates, and burns token budget fast. The fix doubles the delay on each attempt: 1s → 2s → 4s.',
      userPrompt: 'How much latency does this add per request?',
      msg2: 'Zero on the happy path — backoff only applies after a failure. Worst case (2 failures then success) adds 3s total, versus the current behavior of failing outright. <strong style="color:#fff">Safe to accept.</strong>',
      isPass: false, file: 'skills/web_search.py',
      diff: '<div class="ctx">88   RETRY_CONFIG = {</div>\
<div class="ctx">89       <span class="str">"attempts"</span>: 3,</div>\
<div class="added">90 +     <span class="str">"backoff"</span>: <span class="kw">True</span>,</div>\
<div class="added">91 +     <span class="str">"base_delay"</span>: 1.0,  <span class="cm"># 1s → 2s → 4s</span></div>\
<div class="ctx">92   }</div>',
    },
    {
      title: 'Missing trace hooks',
      sevClass: 'sev-amber',
      loc: 'artifacts/report_gen.py:31',
      sevIcon: '~',
      msg1: '<code>generate_report()</code> writes artifacts with no logging or tracing. When something goes wrong in production you have no signal — no timing, no output size, no errors. The fix adds an <code>@observe</code> decorator.',
      userPrompt: 'Does the decorator add latency to report generation?',
      msg2: 'Negligible — it records a timestamp before and after the call and logs asynchronously. Measured overhead is under 1ms per invocation. Read-only instrumentation, no behavior change. <strong style="color:#fff">Safe to accept.</strong>',
      isPass: false, file: 'artifacts/report_gen.py',
      diff: '<div class="ctx">29   <span class="kw">from</span> trustabl <span class="kw">import</span> observe</div>\
<div class="ctx">30</div>\
<div class="added">31 + @<span class="fn">observe</span>(log_timing=<span class="kw">True</span>, log_output=<span class="kw">True</span>)</div>\
<div class="ctx">32   <span class="kw">async def</span> <span class="fn">generate_report</span>(data: <span class="kw">dict</span>):</div>\
<div class="ctx">33       html = <span class="fn">render_template</span>(<span class="str">"report.html"</span>, data)</div>\
<div class="ctx">34       <span class="kw">return</span> <span class="kw">await</span> artifacts.<span class="fn">write</span>(<span class="str">"report.html"</span>, html)</div>',
    },
    {
      title: 'No cost tracking',
      sevClass: 'sev-amber',
      loc: 'agent_core.py:116',
      sevIcon: '~',
      msg1: 'Token usage isn\'t tracked per tool call, so there\'s no visibility into which tools burn budget. Your agent looped 47× with no way to detect it. The fix wraps each call with <code>track_cost()</code>.',
      userPrompt: 'Where do the cost logs end up?',
      msg2: 'They go through your existing logger (<code>log.info</code>) with structured fields — <code>tool</code>, <code>tokens</code>, <code>usd</code>, <code>duration_ms</code> — so they land wherever your logs already ship. Zero behavior change. <strong style="color:#fff">Safe to accept.</strong>',
      isPass: false, file: 'agent_core.py',
      diff: '<div class="ctx">114  <span class="kw">async def</span> <span class="fn">run_tool</span>(name: <span class="kw">str</span>, params: <span class="kw">dict</span>):</div>\
<div class="removed">115 -    result = <span class="kw">await</span> tools[name].<span class="fn">call</span>(params)</div>\
<div class="added">115 +    <span class="kw">async with</span> <span class="fn">track_cost</span>(name) <span class="kw">as</span> meter:</div>\
<div class="added">116 +        result = <span class="kw">await</span> tools[name].<span class="fn">call</span>(params)</div>\
<div class="added">117 +    log.<span class="fn">info</span>(<span class="str">"tool=%s tokens=%d"</span>, name, meter.tokens)</div>\
<div class="ctx">118      <span class="kw">return</span> result</div>',
    },
    {
      title: 'Skill output unguarded',
      sevClass: 'sev-amber',
      loc: 'agent_core.py:202',
      sevIcon: '~',
      msg1: 'Skill output goes straight back to the agent with no guardrail check. If a skill is compromised or returns unexpected content, the agent acts on it with no safety filter in between.',
      userPrompt: 'What exactly does POLICY block?',
      msg2: '<code>POLICY</code> blocks prompt-injection patterns, PII leakage, and instructions that target other tools. Violations raise <code>GuardrailViolation</code> with the matched rule, so nothing is silently dropped. <strong style="color:#fff">Safe to accept.</strong>',
      isPass: false, file: 'agent_core.py',
      diff: '<div class="ctx">199  <span class="kw">async def</span> <span class="fn">run_skill</span>(skill, input: <span class="kw">str</span>):</div>\
<div class="ctx">200      output = <span class="kw">await</span> skill.<span class="fn">execute</span>(input)</div>\
<div class="removed">201 -    return output</div>\
<div class="added">201 +    <span class="kw">return</span> <span class="fn">apply_guardrails</span>(output, POLICY)</div>\
<div class="ctx">202</div>\
<div class="ctx">203  POLICY = <span class="fn">load_policy</span>(<span class="str">"guardrails.yaml"</span>)</div>',
    },
    {
      title: 'Context window safe',
      sevClass: 'sev-pass',
      loc: 'agent_core.py · pass',
      sevIcon: '✓',
      msg1: 'Context window usage is within safe limits across all tested runs. The agent correctly truncates history before hitting the model\'s maximum context length.',
      userPrompt: 'How often does this get re-checked?',
      msg2: 'On every scan — each push to <code>main</code> re-runs the check against your latest traces. If usage trends toward the limit, this flips to a warning before it ever fails. <strong style="color:#fff">No fix needed.</strong>',
      isPass: true, file: 'agent_core.py',
      diff: '<div class="ctx"><span class="cm"># ✓ context_window · no issues found</span></div>\
<div class="ctx"><span class="cm">#   max observed: 14,200 / 128,000 tokens</span></div>\
<div class="ctx"><span class="cm">#   truncation logic: present ✓</span></div>',
    },
  ];

  var active = 0;
  var findingItemEls = [];
  var chatEntryEls = [];

  document.getElementById('findingsCount').textContent = FINDINGS.length;
  document.getElementById('chatCount').textContent = FINDINGS.length + ' findings';

  // Build findings sidebar
  var findingsList = document.getElementById('findingsList');
  PILLARS.forEach(function (group) {
    var groupEl = document.createElement('div');
    groupEl.className = 'pillar-group';

    var labelEl = document.createElement('div');
    labelEl.className = 'pillar-label';
    labelEl.textContent = group.label;
    groupEl.appendChild(labelEl);

    group.items.forEach(function (idx) {
      var item = FINDINGS[idx];
      var itemEl = document.createElement('div');
      itemEl.className = 'finding-item';
      itemEl.addEventListener('click', function () { selectFinding(idx); });

      var iconEl = document.createElement('div');
      iconEl.className = 'sev-icon ' + item.sevClass;
      iconEl.textContent = item.sevIcon;

      var bodyEl = document.createElement('div');
      bodyEl.className = 'finding-body';

      var titleEl = document.createElement('div');
      titleEl.className = 'finding-title';
      titleEl.textContent = item.title;

      var locEl = document.createElement('div');
      locEl.className = 'finding-loc mono';
      locEl.textContent = item.loc;

      bodyEl.appendChild(titleEl);
      bodyEl.appendChild(locEl);
      itemEl.appendChild(iconEl);
      itemEl.appendChild(bodyEl);
      groupEl.appendChild(itemEl);

      findingItemEls[idx] = itemEl;
    });

    findingsList.appendChild(groupEl);
  });

  // Build chat thread
  var chatThread = document.getElementById('chatThread');
  FINDINGS.forEach(function (item, idx) {
    var entry = document.createElement('div');
    entry.className = 'chat-entry';
    entry.addEventListener('click', function () { selectFinding(idx); });

    var stack = document.createElement('div');
    stack.className = 'stack';

    var msg1 = document.createElement('div');
    msg1.className = 'chat-msg';
    msg1.innerHTML = item.msg1;

    var userRow = document.createElement('div');
    userRow.className = 'user-msg-row';
    var userMsg = document.createElement('div');
    userMsg.className = 'user-msg';
    userMsg.textContent = item.userPrompt;
    userRow.appendChild(userMsg);

    var msg2 = document.createElement('div');
    msg2.className = 'chat-msg';
    msg2.innerHTML = item.msg2;

    stack.appendChild(msg1);
    stack.appendChild(userRow);
    stack.appendChild(msg2);

    if (!item.isPass) {
      var fix = document.createElement('div');
      fix.className = 'fix-applied';
      fix.textContent = '✓ Fix applied';
      stack.appendChild(fix);
    }

    entry.appendChild(stack);
    chatThread.appendChild(entry);
    chatEntryEls[idx] = entry;
  });

  function renderDiff() {
    var f = FINDINGS[active];
    document.getElementById('diffFile').textContent = f.file;
    document.getElementById('diffStatus').textContent = f.isPass ? 'check passed' : 'proposed fix';
    document.getElementById('diffCode').innerHTML = f.diff;
  }

  function updateActiveStyles() {
    findingItemEls.forEach(function (el, idx) {
      el.classList.toggle('active', idx === active);
    });
  }

  function scrollChatTo(idx) {
    var el = chatEntryEls[idx];
    var container = chatThread;
    if (el && container) {
      container.scrollTo({ top: el.offsetTop - container.offsetTop - 12, behavior: 'smooth' });
    }
  }

  function selectFinding(idx) {
    active = idx;
    renderDiff();
    updateActiveStyles();
    scrollChatTo(idx);
  }

  // Init
  renderDiff();
  updateActiveStyles();

  // Auto-cycle every 8s
  setInterval(function () {
    selectFinding((active + 1) % FINDINGS.length);
  }, 8000);
</script>
</body>
</html>

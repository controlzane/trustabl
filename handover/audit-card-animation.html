<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trustabl — Audit Card Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050506;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      color: #fff;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      width: 340px;
      height: 144px;
      background: #0A0A0C;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    .findings {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
    }

    .row-icon {
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      flex-shrink: 0;
    }

    .row-label {
      flex: 1;
      font-size: 11px;
      color: #D1D5DB;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    .score-row {
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding-top: 8px;
      opacity: 0;
    }

    .score-label {
      font-size: 11px;
      color: #6B7280;
    }

    .score-value {
      font-size: 13px;
      font-weight: 700;
      color: #F87171;
    }

    /* color variants */
    .red   { color: #F87171; }
    .yellow { color: #FACC15; }
    .teal  { color: #2DD4BF; }
    .badge-red    { background: rgba(239, 68, 68, 0.15);  color: #F87171; }
    .badge-yellow { background: rgba(234, 179, 8, 0.15);  color: #FACC15; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="findings">
      <div class="row" id="row0">
        <span class="row-icon red">✗</span>
        <span class="row-label">Missing retry logic</span>
        <span class="badge badge-red">HIGH</span>
      </div>
      <div class="row" id="row1">
        <span class="row-icon yellow">⚠</span>
        <span class="row-label">No input validation</span>
        <span class="badge badge-yellow">MED</span>
      </div>
      <div class="row" id="row2">
        <span class="row-icon teal">✓</span>
        <span class="row-label">Schema structure OK</span>
      </div>
    </div>
    <div class="score-row" id="scoreRow">
      <span class="score-label">Score</span>
      <span class="score-value">38%</span>
      <span class="badge badge-red">High Risk</span>
    </div>
  </div>

  <script>
    const ANIM = 'fadeSlideIn 0.5s cubic-bezier(0.25,0.1,0.25,1) forwards';
    const delays = [0.25, 0.63, 1.01, 1.85];
    const LOOP_MS = 7000;

    function play() {
      const rows = [
        document.getElementById('row0'),
        document.getElementById('row1'),
        document.getElementById('row2'),
        document.getElementById('scoreRow'),
      ];

      rows.forEach((el, i) => {
        el.style.opacity = '0';
        el.style.animation = 'none';
        // force reflow so animation restarts
        void el.offsetWidth;
        el.style.animation = ANIM;
        el.style.animationDelay = delays[i] + 's';
      });
    }

    play();
    setInterval(play, LOOP_MS);
  </script>
</body>
</html>

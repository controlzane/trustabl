<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step 02 — Detect Production Gaps (Scanning Animation)</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #050506;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .card {
    width: 100%;
    max-width: 420px;
    height: 176px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-radius: 1rem;
    border: 1px solid rgba(255,255,255,0.08);
    background: #0A0A0C;
    padding: 1rem 1.25rem;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .pulse-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #2DD4BF;
    animation: scanPulse 1s ease-in-out infinite;
  }
  .label {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #2DD4BF;
  }
  .summary {
    font-family: monospace;
    font-size: 10px;
    color: rgba(75,85,99,1);
    opacity: 0;
    animation: fadeSlideIn 0.3s ease forwards;
    animation-delay: 2.2s;
  }

  /* File rows */
  .files { display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .row {
    display: flex;
    align-items: center;
    gap: 0.625rem;
    opacity: 0;
    animation: fadeSlideIn 0.35s ease forwards;
  }
  .row-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(75,85,99,1);
    flex-shrink: 0;
    transition: background 0.3s ease;
  }
  .filename {
    flex: 1;
    font-family: monospace;
    font-size: 11px;
    color: rgba(156,163,175,1);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .result-wrap {
    position: relative;
    width: 3.5rem;
    text-align: right;
  }
  .dots {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 2px;
    font-size: 10px;
    color: rgba(75,85,99,1);
    animation: fadeOut 0.2s ease forwards;
  }
  .result {
    font-size: 10px;
    font-weight: 600;
    opacity: 0;
    animation: fadeSlideIn 0.3s ease forwards;
  }
  .c-red { color: #F87171; }
  .c-yellow { color: #FBBF24; }
  .c-teal { color: #2DD4BF; }

  /* Keyframes */
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes scanPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.7); }
  }
  @keyframes blink {
    0%, 100% { opacity: 0.2; }
    50%      { opacity: 1; }
  }
  @keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
  }
</style>
</head>
<body>

<div class="card" id="card"></div>

<script>
var files = [
  { name: 'agent.ts',            result: '3 gaps', cls: 'c-red',    dot: '#F87171', enter: '0.15s', resolve: 0.75 },
  { name: 'tools/search.ts',     result: '1 gap',  cls: 'c-yellow', dot: '#FBBF24', enter: '0.55s', resolve: 1.15 },
  { name: 'tools/deploy.ts',     result: '2 gaps', cls: 'c-red',    dot: '#F87171', enter: '0.95s', resolve: 1.55 },
  { name: 'skills/summarize.ts', result: 'clean',  cls: 'c-teal',   dot: '#2DD4BF', enter: '1.35s', resolve: 1.95 },
];

function render() {
  var h = '<div class="header">' +
    '<div class="header-left"><div class="pulse-dot"></div><span class="label">Scanning</span></div>' +
    '<span class="summary">4 files · 6 gaps</span></div><div class="files">';

  files.forEach(function(f) {
    h += '<div class="row" style="animation-delay:' + f.enter + '">' +
      '<div class="row-dot" data-color="' + f.dot + '" data-delay="' + f.resolve + '"></div>' +
      '<span class="filename">' + f.name + '</span>' +
      '<span class="result-wrap">' +
        '<span class="dots" style="animation-delay:' + f.resolve + 's">' +
          '<span style="animation:blink .6s step-end infinite">·</span>' +
          '<span style="animation:blink .6s step-end infinite .2s">·</span>' +
          '<span style="animation:blink .6s step-end infinite .4s">·</span>' +
        '</span>' +
        '<span class="result ' + f.cls + '" style="animation-delay:' + f.resolve + 's">' + f.result + '</span>' +
      '</span></div>';
  });
  h += '</div>';
  document.getElementById('card').innerHTML = h;

  // Dot color change via JS timeout
  document.querySelectorAll('.row-dot[data-color]').forEach(function(el) {
    setTimeout(function() { el.style.background = el.dataset.color; }, el.dataset.delay * 1000);
  });
}

render();
setInterval(render, 7000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step 04 — Merge & Deploy Animation</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #050506;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .card {
    width: 100%;
    max-width: 420px;
    height: 176px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.25rem;
    overflow: hidden;
    border-radius: 1rem;
    border: 1px solid rgba(255,255,255,0.08);
    background: #0A0A0C;
    padding: 1rem 1.5rem;
  }

  /* Merge icon */
  .icon-wrap {
    position: relative;
    flex-shrink: 0;
    opacity: 0;
    animation: scaleFadeIn 0.5s ease forwards;
    animation-delay: 0.2s;
  }
  .icon-box {
    display: flex;
    width: 4rem; height: 4rem;
    align-items: center;
    justify-content: center;
    border-radius: 1rem;
    border: 1px solid rgba(45,212,191,0.2);
    background: rgba(45,212,191,0.05);
  }
  .glow-ring {
    position: absolute;
    inset: -8px;
    border-radius: 1.5rem;
    border: 1px solid rgba(45,212,191,0.1);
    animation: mergeGlow 2s ease-in-out infinite;
    animation-delay: 0.8s;
  }

  /* Status */
  .status {
    display: flex;
    flex-direction: column;
    gap: 0.625rem;
  }
  .status-line {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    opacity: 0;
    animation: fadeSlideIn 0.4s ease forwards;
  }
  .merged-text { font-size: 14px; font-weight: 600; color: #fff; }
  .check { font-size: 14px; font-weight: 700; color: #2DD4BF; }
  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #2DD4BF;
    box-shadow: 0 0 6px rgba(45,212,191,0.6);
  }
  .live-text { font-size: 12px; font-weight: 500; color: #2DD4BF; }

  /* Keyframes */
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleFadeIn {
    from { opacity: 0; transform: scale(0.88); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes mergeGlow {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50%      { opacity: 0.8; transform: scale(1.08); }
  }
</style>
</head>
<body>

<div class="card" id="card"></div>

<script>
function render() {
  document.getElementById('card').innerHTML =
    '<div class="icon-wrap">' +
      '<div class="icon-box">' +
        '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2DD4BF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
          '<circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M6 21V9a9 9 0 0 0 9 9"/>' +
        '</svg>' +
      '</div>' +
      '<div class="glow-ring"></div>' +
    '</div>' +
    '<div class="status">' +
      '<div class="status-line" style="animation-delay:0.6s">' +
        '<span class="merged-text">Merged to main</span>' +
        '<span class="check">✓</span>' +
      '</div>' +
      '<div class="status-line" style="animation-delay:1.3s">' +
        '<div class="live-dot"></div>' +
        '<span class="live-text">Deployed to production</span>' +
      '</div>' +
    '</div>';
}

render();
setInterval(render, 7000);
</script>
</body>
</html>

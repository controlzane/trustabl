<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step 03 — Get Fixes in Your IDE (Code Diff Animation)</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #050506;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .card {
    width: 100%;
    max-width: 420px;
    height: 176px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-radius: 1rem;
    border: 1px solid rgba(255,255,255,0.08);
    background: #0A0A0C;
    padding: 1rem 1.25rem;
  }

  /* IDE header */
  .ide-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
  }
  .ide-header-left {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .win-dots { display: flex; gap: 6px; }
  .win-dot { width: 8px; height: 8px; border-radius: 50%; }
  .win-dot--r { background: rgba(239,68,68,0.6); }
  .win-dot--y { background: rgba(234,179,8,0.6); }
  .win-dot--g { background: rgba(34,197,94,0.6); }
  .filename { font-size: 10px; color: rgba(107,114,128,1); }
  .badge {
    font-size: 9px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #2DD4BF;
    opacity: 0;
    animation: fadeSlideIn 0.3s ease forwards;
    animation-delay: 0.2s;
  }

  /* Diff */
  .diff {
    flex: 1;
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
    line-height: 1.7;
  }
  .line {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .line--anim {
    opacity: 0;
    animation: fadeSlideIn 0.4s ease forwards;
  }
  .num {
    width: 1rem;
    text-align: right;
    color: rgba(75,85,99,1);
  }
  .ctx { padding: 0 6px; color: rgba(107,114,128,1); }
  .del {
    border-radius: 4px;
    background: rgba(239,68,68,0.1);
    padding: 0 6px;
    color: #F87171;
    text-decoration: line-through;
    text-decoration-color: rgba(239,68,68,0.4);
  }
  .del-m { margin-right: 4px; color: rgba(239,68,68,0.6); }
  .add {
    border-radius: 4px;
    background: rgba(45,212,191,0.1);
    padding: 0 6px;
    color: #2DD4BF;
  }
  .add-m { margin-right: 4px; color: rgba(45,212,191,0.6); }

  /* Accept bar */
  .bar {
    margin-top: 0.5rem;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 0.5rem;
    border-top: 1px solid rgba(255,255,255,0.05);
    padding-top: 0.5rem;
    opacity: 0;
    animation: fadeSlideIn 0.3s ease forwards;
    animation-delay: 2.1s;
  }
  .btn {
    border-radius: 4px;
    padding: 2px 10px;
    font-size: 10px;
    border: none;
    cursor: pointer;
  }
  .btn--dismiss { background: rgba(255,255,255,0.05); font-weight: 500; color: rgba(107,114,128,1); }
  .btn--accept { background: rgba(45,212,191,0.15); font-weight: 600; color: #2DD4BF; }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="card" id="card"></div>

<script>
function render() {
  document.getElementById('card').innerHTML =
    '<div class="ide-header">' +
      '<div class="ide-header-left">' +
        '<div class="win-dots"><div class="win-dot win-dot--r"></div><div class="win-dot win-dot--y"></div><div class="win-dot win-dot--g"></div></div>' +
        '<span class="filename">agent.ts</span>' +
      '</div>' +
      '<span class="badge">Trustabl Fix</span>' +
    '</div>' +
    '<div class="diff">' +
      '<div class="line"><span class="num">11</span><span class="ctx">// fetch data</span></div>' +
      '<div class="line line--anim" style="animation-delay:0.5s"><span class="num">12</span><span class="del"><span class="del-m">−</span>const res = await fetch(url);</span></div>' +
      '<div class="line line--anim" style="animation-delay:1.1s"><span class="num">12</span><span class="add"><span class="add-m">+</span>const res = await retry(</span></div>' +
      '<div class="line line--anim" style="animation-delay:1.4s"><span class="num">13</span><span class="add"><span class="add-m">+</span>&nbsp;&nbsp;() =&gt; fetch(url), { retries: 3 }</span></div>' +
      '<div class="line line--anim" style="animation-delay:1.65s"><span class="num">14</span><span class="add"><span class="add-m">+</span>);</span></div>' +
    '</div>' +
    '<div class="bar">' +
      '<span class="btn btn--dismiss">Dismiss</span>' +
      '<span class="btn btn--accept">Accept Fix</span>' +
    '</div>';
}

render();
setInterval(render, 7000);
</script>
</body>
</html>
